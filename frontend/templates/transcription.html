<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ORION - Speech to Text</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0c29, #1b1b2f, #16213e);
    color: white;
    margin: 0;
}

.navbar {
    background: black;
}

.transcription-container {
    max-width: 900px;
    margin: 60px auto;
}

.result-box {
    min-height: 220px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(108, 76, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.file-input {
    background: rgba(255,255,255,0.08);
    border: none;
    color: white;
    border-radius: 20px;
    padding: 10px;
}

.file-input::-webkit-file-upload-button {
    background: #6c4cff;
    border: none;
    color: white;
    border-radius: 15px;
    padding: 6px 12px;
    margin-right: 10px;
    cursor: pointer;
}

.btn-orion {
    background: #6c4cff;
    border: none;
    border-radius: 25px;
    padding: 10px 30px;
    color: white;
    transition: 0.2s;
}

.btn-orion:hover {
    background: #8a6cff;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark shadow">
  <div class="container">
    <a href="/" class="navbar-brand fw-bold">ORION</a>
  </div>
</nav>

<div class="transcription-container">
    <h3 class="mb-4 text-center">transformar voz em texto 🎙️</h3>

    <div class="mb-4 text-center">
        <input type="file" id="audioFile" accept="audio/*" class="file-input">
    </div>

    <div class="text-center mb-4">
        <button class="btn btn-orion" onclick="transcribeAudio()">Transcrever</button>
    </div>

    <div id="resultBox" class="result-box">
        <span class="text-secondary">O texto transcrito aparecerá aqui</span>
    </div>
</div>

<script>
async function transcribeAudio() {
    const fileInput = document.getElementById("audioFile");
    const resultBox = document.getElementById("resultBox");

    if (!fileInput.files.length) {
        resultBox.innerHTML = "Selecione um arquivo de áudio primeiro.";
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    resultBox.innerHTML = "Orion está ouvindo seu áudio... 👂";

    try {
        const response = await fetch("/api/transcription/generate", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Erro na requisição");
        }

        const data = await response.json();

        resultBox.innerHTML = `
            <div style="white-space: pre-wrap;">
                ${data.text}
            </div>
        `;

    } catch (error) {
        resultBox.innerHTML = "Erro ao transcrever áudio.";
        console.error(error);
    }
}
</script>

</body>
</html>
