<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ORION - Chat</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0c29, #1b1b2f, #16213e);
    color: white;
    margin: 0;
}

/* NAVBAR */
.navbar {
    background: black;
}

/* CONTAINER CENTRAL */
.chat-container {
    max-width: 900px;
    margin: 60px auto;
}

/* CAIXA DO CHAT */
.chat-box {
    height: 500px;
    overflow-y: auto;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(108, 76, 255, 0.15);
}

/* MENSAGENS */
.message {
    display: flex;
    margin-bottom: 15px;
}

.user {
    justify-content: flex-end;
}

.bot {
    justify-content: flex-start;
}

.bubble {
    max-width: 70%;
    padding: 12px 18px;
    border-radius: 20px;
    font-size: 15px;
}

/* BOLHA USUÁRIO */
.user .bubble {
    background: #6c4cff;
    box-shadow: 0 0 15px rgba(108, 76, 255, 0.4);
}

/* BOLHA ORION */
.bot .bubble {
    background: #2a1f4d;
}

/* INPUT */
.input-area {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.form-control {
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: white;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.6);
}

.form-control:focus {
    background: rgba(255,255,255,0.12);
    box-shadow: none;
    color: white;
}

/* BOTÃO */
.btn-orion {
    background: #6c4cff;
    border: none;
    border-radius: 20px;
    padding: 0 25px;
    color: white;
    transition: 0.2s;
}

.btn-orion:hover {
    background: #8a6cff;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark shadow">
  <div class="container">
    <a href="/" class="navbar-brand fw-bold">ORION</a>
  </div>
</nav>

<div class="chat-container">
    <h3 class="mb-4 text-center">vamos conversar!</h3>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="messageInput" class="form-control" placeholder="Digite sua mensagem..." autocomplete="off">
        <button class="btn btn-orion" onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("messageInput");
    const chatBox = document.getElementById("chatBox");
    const message = input.value.trim();
    if (!message) return;

    // mensagem usuário
    chatBox.innerHTML += `
    <div class="message user">
        <div class="bubble">${message}</div>
    </div>
    `;

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    // indicador digitando
    chatBox.innerHTML += `
    <div class="message bot" id="typing">
        <div class="bubble">Orion está digitando...</div>
    </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/api/text/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        // remove digitando
        document.getElementById("typing")?.remove();

        // resposta Orion
        chatBox.innerHTML += `
        <div class="message bot">
            <div class="bubble">${data.response}</div>
        </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        document.getElementById("typing")?.remove();

        chatBox.innerHTML += `
        <div class="message bot">
            <div class="bubble">Erro ao conectar com o Orion.</div>
        </div>
        `;
    }
}

// ENTER envia
document.getElementById("messageInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
