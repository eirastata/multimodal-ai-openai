<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ORION - Vision</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0c29, #1b1b2f, #16213e);
    color: white;
    margin: 0;
}

.navbar {
    background: black;
}

.vision-container {
    max-width: 900px;
    margin: 60px auto;
}

.result-box {
    min-height: 400px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(108, 76, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.btn-orion {
    background: #6c4cff;
    border: none;
    border-radius: 25px;
    padding: 10px 30px;
    color: white;
    transition: 0.2s;
}

.btn-orion:hover {
    background: #8a6cff;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark shadow">
  <div class="container">
    <a href="/" class="navbar-brand fw-bold">ORION</a>
  </div>
</nav>

<div class="vision-container">
    <h3 class="mb-4 text-center">vamos criar imagens! 🎨</h3>

    <div id="resultBox" class="result-box">
        <span class="text-secondary">Sua imagem aparecerá aqui</span>
    </div>

    <div class="input-group mt-4">
        <input type="text" id="promptInput" class="form-control"
        placeholder="Descreva a imagem que você quer gerar...">
        <button class="btn btn-orion" onclick="generateImage()">Criar</button>
    </div>
</div>

<script>
async function generateImage() {

    const prompt = document.getElementById("promptInput").value;
    const resultBox = document.getElementById("resultBox");

    if (!prompt) return;

    resultBox.innerHTML = "Orion está criando sua imagem... 🎨";

    try {

        const response = await fetch("/api/vision/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: prompt })
        });

        if (!response.ok) {
            throw new Error("Erro na requisição");
        }

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        resultBox.innerHTML = `
            <img src="${imageUrl}" style="max-width:100%; border-radius:20px;">
        `;

    } catch (error) {
        resultBox.innerHTML = "Erro ao gerar imagem.";
        console.error(error);
    }
}
</script>

</body>
</html>
