<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ORION - Text to Speech</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f0c29, #1b1b2f, #16213e);
    color: white;
    margin: 0;
}

.navbar {
    background: black;
}

.speech-container {
    max-width: 900px;
    margin: 60px auto;
}

.result-box {
    min-height: 200px;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(108, 76, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

textarea {
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: white;
    resize: none;
    padding: 15px;
}

textarea::placeholder {
    color: rgba(255,255,255,0.6);
}

textarea:focus {
    background: rgba(255,255,255,0.12);
    box-shadow: none;
    color: white;
}

.btn-orion {
    background: #6c4cff;
    border: none;
    border-radius: 20px;
    padding: 10px 25px;
    color: white;
    transition: 0.2s;
}

.btn-orion:hover {
    background: #8a6cff;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark shadow">
  <div class="container">
    <a href="/" class="navbar-brand fw-bold">ORION</a>
  </div>
</nav>

<div class="speech-container">
    <h3 class="mb-4 text-center">transformar texto em voz 🎙️</h3>

    <div class="mb-4">
        <textarea id="textInput" class="form-control" rows="5"
        placeholder="Digite o texto que você quer transformar em voz..."></textarea>
    </div>

    <div class="text-center mb-4">
        <button class="btn btn-orion" onclick="generateSpeech()">Gerar voz</button>
    </div>

    <div id="resultBox" class="result-box">
        <span class="text-secondary">O áudio aparecerá aqui</span>
    </div>
</div>

<script>
async function generateSpeech() {
    const text = document.getElementById("textInput").value.trim();
    const resultBox = document.getElementById("resultBox");

    if (!text) return;

    resultBox.innerHTML = "Orion está gerando a voz... 🔊";

    try {
        const response = await fetch("/api/speech/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text })
        });

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);

        resultBox.innerHTML = `
            <audio controls autoplay>
                <source src="${audioUrl}" type="audio/mpeg">
                Seu navegador não suporta áudio.
            </audio>
        `;

    } catch (error) {
        resultBox.innerHTML = "Erro ao gerar áudio.";
    }
}
</script>

</body>
</html>
